name: Update Star Citizen Data

on:
  schedule:
    # This runs the script every 12 hours (UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows you to run it manually with a button click

# This block ensures only ONE job runs at a time.
# If a new one starts while an old one is still waiting (PC was off), 
# it cancels the old one so you always get the freshest data.
concurrency:
  group: star-citizen-data-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run UEX Builder
        env:
          UEX_API_KEY: ${{ secrets.UEX_API_KEY }}
        run: node uex-builder.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Check for changes
          git diff --quiet game-data.js
          
          # $LASTEXITCODE is 0 if no changes, 1 if changes exist
          if ($LASTEXITCODE -ne 0) {
              echo "Changes detected! Updating game-data.js..."
              git add game-data.js
              git commit -m "Auto-update: Fresh Market Prices"
              git push
          } else {
              echo "No changes detected. Skipping update."
          }